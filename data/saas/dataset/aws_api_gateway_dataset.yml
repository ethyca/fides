dataset:
  - fides_key: <instance_fides_key>
    name: AWS API Gateway Dataset
    description: >
      Example dataset for an AWS API Gateway connector using IAM Role authentication.
      Adjust field names and data_categories to match your actual API response shapes.
    collections:
      # ------------------------------------------------------------------
      # user — maps to the /users endpoint in the config
      # ------------------------------------------------------------------
      - name: user
        fields:
          - name: id
            data_categories: [user.unique_id]
            fidesops_meta:
              primary_key: true
              data_type: string

          - name: email
            data_categories: [user.contact.email]
            fidesops_meta:
              data_type: string
              identity: email        # Fides uses this field to locate the user

          - name: first_name
            data_categories: [user.name]
            fidesops_meta:
              data_type: string

          - name: last_name
            data_categories: [user.name]
            fidesops_meta:
              data_type: string

          - name: phone
            data_categories: [user.contact.phone_number]
            fidesops_meta:
              data_type: string

          - name: created_at
            data_categories: [system.operations]

          - name: updated_at
            data_categories: [system.operations]

      # ------------------------------------------------------------------
      # order — maps to the /orders endpoint in the config
      # ------------------------------------------------------------------
      - name: order
        fields:
          - name: id
            data_categories: [system.operations]
            fidesops_meta:
              primary_key: true
              data_type: string

          - name: user_id
            data_categories: [user.unique_id]
            fidesops_meta:
              data_type: string
              references:
                - dataset: <instance_fides_key>
                  field: user.id
                  direction: from

          - name: status
            data_categories: [system.operations]

          - name: total
            data_categories: [system.operations]

          - name: created_at
            data_categories: [system.operations]
