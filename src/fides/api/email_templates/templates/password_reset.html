<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Password Reset</title>
  </head>
  <body>
    <main>
      <p>We received a request to reset your Fides account password. Click <a href={{admin_ui_url}}/login?reset_token={{reset_token}}&username={{username}}>here</a> to reset your password.</p>
      <p>This link will expire in {{ttl_minutes}} minutes. If you did not request this reset, you can safely ignore this email.</p>
    </main>
  </body>
</html>
