\* DsrWatchdog_buggy.cfg — Buggy spec: CancelImpliesRetriesExhausted should FAIL
\*
\* Demonstrates the bugs: the watchdog hard-cancels without consulting
\* retry_count, violating the invariant that cancellation requires
\* retry_count >= MaxRetries.
\*
\* BUG 1: pending+upstream_complete bypasses ENG-2756 guard → direct cancel
\* BUG 2: in_processing+no_cache → direct cancel (bypasses retry logic)
\*
\* Minimal counterexample (3 states):
\*   1. Init: both tasks pending, retry_count=0, parent alive
\*   2. ParentDies: parent dead, tasks still pending, no cache keys
\*   3. WatchdogRunBuggy: pr_status -> "error", retry_count still 0
\*      Fails CancelImpliesRetriesExhausted: 0 < MaxRetries=2
\*
\* Run with:
\*   /opt/homebrew/opt/openjdk/bin/java -XX:+UseParallelGC \
\*     -jar ~/tla2tools.jar -deadlock \
\*     -config specs/DsrWatchdog_buggy.cfg specs/DsrWatchdog.tla

SPECIFICATION FairSpec

CONSTANTS
    MaxRetries = 2

INVARIANTS
    TypeOK
    CancelImpliesRetriesExhausted

PROPERTIES
    EventualResolution
