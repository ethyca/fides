\* DsrWatchdog_buggy.cfg — Buggy spec: CancelImpliesGenuinelyStuck should FAIL
\* Demonstrates the bug: the watchdog cancels when the only tasks
\* with no cache key are pending (never dispatched), not in_processing.
\*
\* Minimal counterexample (3 states):
\*   1. Init: both tasks pending, parent alive
\*   2. ParentDies: parent dead, tasks still pending, no cache keys
\*   3. WatchdogRunBuggy: pr_status -> "error"
\*      Task 1 pending+upstream_complete bypasses ENG-2756 guard.
\*
\* Run with:
\*   /opt/homebrew/opt/openjdk/bin/java -XX:+UseParallelGC \
\*     -jar ~/tla2tools.jar -deadlock \
\*     -config specs/DsrWatchdog_buggy.cfg specs/DsrWatchdog.tla

SPECIFICATION FairSpec

INVARIANTS
    TypeOK
    CancelImpliesGenuinelyStuck
    NoPendingOnlyCancelCause

PROPERTIES
    EventualResolution
