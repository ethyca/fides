saas_config:
  fides_key: async_polling_error_example
  name: Async Polling Error Example
  type: async_polling_error_example
  description: Example SaaS config for testing graceful error handling in async polling
  version: 0.0.1

  connector_params:
    - name: domain
    - name: api_token
      label: API token
      sensitive: True

  client_config:
    protocol: https
    host: <domain>
    authentication:
      strategy: bearer
      configuration:
        token: <api_token>

  test_request:
    method: GET
    path: /test

  endpoints:
    - name: user
      requests:
        read:
          method: GET
          path: /api/access-package
          param_values:
            - name: email
              identity: email
          correlation_id_path: request_id
          async_config:
            strategy: polling
            configuration:
              status_request:
                # Override raises an exception — models a failing external service
                request_override: test_async_polling_status_error
              result_request:
                method: GET
                path: /api/access-package/result
        delete:
          method: DELETE
          path: /api/anonymize-user/<email>
          param_values:
            - name: email
              identity: email
          correlation_id_path: correlation_id
          async_config:
            strategy: polling
            configuration:
              status_request:
                # Override raises an exception — models a failing external service
                request_override: test_async_polling_status_error
