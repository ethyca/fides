# Claude Code Review
#
# Thin caller that delegates to the global reusable workflow in
# ethyca/global-github-actions. That workflow handles talos context,
# codegraph setup, and the Claude Code action.
#
# Triggers:
#   - PR opened (non-draft) or moved out of draft
#   - PR reopened
#   - Comment containing "/code-review" on a PR (trusted users only)
#
# Required secrets (org-level, passed via secrets: inherit):
#   ANTHROPIC_API_KEY            — Anthropic API key for Claude
#   CROSS_REPO_APP_PRIVATE_KEY   — GitHub App private key (ethyca-cross-repo)
# Required vars (org-level):
#   CROSS_REPO_APP_ID            — GitHub App ID (ethyca-cross-repo)

name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: >
      (
        github.event_name == 'pull_request'
        && !github.event.pull_request.draft
        && github.actor != 'dependabot[bot]'
      )
      || (
        github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && contains(github.event.comment.body, '/code-review')
        && contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    uses: ethyca/global-github-actions/.github/workflows/claude-code-review.yml@main
    with:
      enable_codegraph: true
    secrets: inherit
