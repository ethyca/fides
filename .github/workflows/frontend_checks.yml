name: Frontend Code Checks

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - "main"
      - "release-**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CI: true

jobs:
  Check-Frontend-Changes:
    runs-on: ubuntu-latest
    outputs:
      has_frontend_changes: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for frontend file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            frontend:
              - 'clients/**'
              - '.github/workflows/frontend_checks.yml'

      - name: Log changed files
        if: steps.filter.outputs.frontend == 'true'
        run: echo "${{ steps.filter.outputs.frontend_files }}"

  Clients-Unit:
    needs: Check-Frontend-Changes
    if: needs.Check-Frontend-Changes.outputs.has_frontend_changes == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate docs
        working-directory: clients/fides-js
        run: npm run docs:generate

      - name: Fail if docs are not up to date
        working-directory: clients/fides-js
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Docs are not up to date. Please run 'npm run docs:generate' and commit the changes.";
            git status
            git diff
            exit 1
          fi

      - name: Check (lint, format, typecheck)
        run: npm run check:ci

      - name: Unit tests
        run: npm run test:ci
        
      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        id: test-coverage-upload-step
        with:
          path: |
            ${{ github.workspace }}/clients/admin-ui/coverage/coverage-summary.json
            ${{ github.workspace }}/clients/fides-js/coverage/coverage-summary.json
            ${{ github.workspace }}/clients/privacy-center/coverage/coverage-summary.json
          if-no-files-found: error

  # Summary job for branch protection - consolidates all frontend checks
  Frontend-Checks-Summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - Clients-Unit
    steps:
      - name: Check job results
        run: |
          echo "Clients-Unit: ${{ needs.Clients-Unit.result }}"

          # Fail only if jobs failed (not if skipped)
          if [ "${{ needs.Clients-Unit.result }}" == "failure" ]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi

          # Check for cancelled jobs (treat as failure)
          if [ "${{ needs.Clients-Unit.result }}" == "cancelled" ]; then
            echo "❌ One or more required jobs were cancelled"
            exit 1
          fi

          echo "✅ All required frontend checks passed or were skipped"

  Frontend-Coverage:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - Clients-Unit
    steps:
      - name: Download Test Coverage Artifact
        id: test-coverage-download-step
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.test-coverage-upload-step.outputs.artifact-id }}
          path: /tmp/test-coverage

      - name: Debug
        run: |
          ls -al ${{ steps.test-coverage-download-step.outputs.download-path }}
          ls -al ${{ steps.test-coverage-download-step.outputs.download-path }}/admin-ui/coverage

      - name: Jest Coverage Comment
        uses: MishaKav/jest-coverage-comment@main
        with:
          multiple-files: |
            admin-ui, ${{ steps.test-coverage-download-step.outputs.download-path }}/admin-ui/coverage/coverage-summary.json
            fides-js, ${{ steps.test-coverage-download-step.outputs.download-path }}/fides-js/coverage/coverage-summary.json
            privacy-center, ${{ steps.test-coverage-download-step.outputs.download-path }}/privacy-center/coverage/coverage-summary.json
