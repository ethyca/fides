# Policy Engine v2 Test Policies
# These policies demonstrate both ALLOW and DENY scenarios against synthetic systems

policies:
  # =============================================================================
  # DENY POLICIES - These will block certain data processing activities
  # =============================================================================

  - fides_key: deny_third_party_ads
    name: Block Third-Party Advertising
    description: >
      Deny any processing for third-party targeted advertising.
      This policy will DENY systems like facebook_pixel and google_ad_manager.
    enabled: true
    deny:
      data_use:
        operator: any
        values:
          - marketing.advertising.third_party
          - marketing.advertising.third_party.targeted
    unless:

  - fides_key: deny_visitor_profiling
    name: Block Profiling for Anonymous Visitors
    description: >
      Deny profiling activities that target visitors or anonymous users.
      This policy will DENY dmp and recommendation_engine when processing visitor data.
    enabled: true
    deny:
      data_use:
        operator: any
        values:
          - marketing.advertising.profiling
          - personalize.content.profiled
      data_subject:
        operator: any
        values:
          - visitor
          - anonymous_user

  # =============================================================================
  # ALLOW POLICIES - These permit specific data processing activities
  # =============================================================================

  - fides_key: allow_essential
    name: Allow Essential Services
    description: >
      Always permit essential service operations.
      This policy will ALLOW news_website, subscriber_api, payment_processor, etc.
    enabled: true
    allow:
      data_use:
        operator: any
        values:
          - essential
          - essential.service
          - essential.service.authentication
          - essential.service.payment_processing
          - essential.service.operations
          - essential.service.notifications
          - essential.service.notifications.email
          - essential.service.operations.support
          - essential.legal_obligation

  - fides_key: allow_analytics
    name: Allow Analytics and Reporting
    description: >
      Permit analytics and reporting activities.
      This policy will ALLOW google_analytics, adobe_analytics, snowflake_warehouse, etc.
    enabled: true
    allow:
      data_use:
        operator: any
        values:
          - analytics
          - analytics.reporting
          - analytics.reporting.system
          - analytics.reporting.system.performance
          - analytics.reporting.content_performance
          - analytics.reporting.ad_performance
          - analytics.reporting.campaign_insights

  # =============================================================================
  # CONDITIONAL POLICIES - Split from multi-rule policies
  # =============================================================================

  - fides_key: allow_payment_processing
    name: Allow Financial Data for Payment Processing
    description: >
      Allow financial data processing for payment and employment purposes.
    enabled: true
    allow:
      data_category:
        operator: any
        values:
          - user.financial
          - user.financial.credit_card
          - user.financial.bank_account
      data_use:
        operator: any
        values:
          - essential.service.payment_processing
          - employment

  - fides_key: deny_financial_data_other_uses
    name: Deny Financial Data for Non-Payment Uses
    description: >
      Deny processing of financial data for any purpose other than payment or employment.
      This will DENY if financial data is used for non-payment purposes.
    enabled: true
    deny:
      data_category:
        operator: any
        values:
          - user.financial
          - user.financial.credit_card
          - user.financial.bank_account
    unless:
      any:
        - consent:
          preference_key:
            - financial_data_processing
          value: opt_out
        - user:
          key: age
          value: 18
          operator: less_than

  - fides_key: allow_first_party_ads_for_customers
    name: Allow First-Party Targeted Ads for Customers
    description: >
      Allow first-party targeted advertising when targeting customers only.
    enabled: true
    allow:
      data_use:
        operator: any
        values:
          - marketing.advertising.first_party.targeted
      data_subject:
        values:
          - customer

  - fides_key: deny_first_party_ads_for_visitors
    name: Deny First-Party Targeted Ads for Visitors
    description: >
      Deny first-party targeted advertising when targeting visitors or anonymous users.
    enabled: true
    deny:
      data_use:
        operator: any
        values:
          - marketing.advertising.first_party.targeted
      data_subject:
        operator: any
        values:
          - visitor
          - anonymous_user

  - fides_key: allow_ip_for_essential
    name: Allow IP Address Collection for Essential Services
    description: >
      Allow IP address collection for essential services and analytics.
    enabled: true
    allow:
      data_category:
        operator: any
        values:
          - user.device.ip_address
      data_use:
        operator: any
        values:
          - essential
          - essential.service
          - analytics.reporting.system.performance
          - collect

  - fides_key: deny_ip_for_advertising
    name: Deny IP Address Collection for Advertising
    description: >
      Deny IP address collection for advertising purposes.
    enabled: true
    deny:
      data_category:
        operator: any
        values:
          - user.device.ip_address
      data_use:
        operator: any
        values:
          - marketing.advertising.third_party.targeted

  # =============================================================================
  # DOMAIN-SPECIFIC POLICIES
  # =============================================================================

  - fides_key: allow_employment_processing
    name: Employment Data Protection
    description: >
      Allow employment-related processing only for employee data subjects.
      This will ALLOW hr_system, payroll_system, applicant_tracking.
    enabled: true
    allow:
      data_use:
        operator: any
        values:
          - employment
          - employment.recruitment
          - operations
      data_subject:
        operator: any
        values:
          - employee
          - job_applicant

  - fides_key: allow_functional
    name: Allow Functional Services
    description: >
      Permit functional service operations like search and comments.
      This will ALLOW comment_system, search_service, etc.
    enabled: true
    allow:
      data_use:
        operator: any
        values:
          - functional
          - functional.service

  - fides_key: allow_sales
    name: Allow Sales and Marketing Communications
    description: >
      Permit sales and email marketing activities.
      This will ALLOW salesforce_crm, marketing_cloud.
    enabled: true
    allow:
      data_use:
        operator: any
        values:
          - sales
          - marketing.communications
          - marketing.communications.email

  - fides_key: allow_personalize_customers
    name: Allow Content Personalization for Customers
    description: >
      Permit personalization activities for customers only.
    enabled: true
    allow:
      data_use:
        operator: any
        values:
          - personalize
          - personalize.content
      data_subject:
        operator: any
        values:
          - customer
